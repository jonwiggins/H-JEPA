# LeWM smoke test: 2 batches, 1 epoch, ViT-Tiny, CIFAR-10.
# Verifies the new flags wire through end-to-end training without error.

experiment:
  name: lewm_smoke
  seed: 42
  output_dir: results/lewm_smoke

model:
  encoder_type: vit_tiny_patch16_224
  img_size: 224
  embed_dim: 192
  num_hierarchies: 2
  use_fpn: false
  use_rope: false
  use_flash_attention: false
  use_layerscale: false
  projection_norm: batchnorm
  use_target_encoder: false
  predictor:
    depth: 2
    num_heads: 3
    mlp_ratio: 2.0

data:
  dataset: cifar10
  data_path: ./data
  image_size: 224
  batch_size: 4
  num_workers: 0

masking:
  num_target_masks: 2
  mask_scale: [0.15, 0.4]
  aspect_ratio: [0.5, 2.0]
  num_context_masks: 1

loss:
  type: hjepa_sigreg
  hierarchy_weights: [1.0, 0.8]
  detach_targets: false
  sigreg_num_slices: 64
  sigreg_weight: 25.0
  sigreg_invariance_weight: 25.0
  sigreg_loss_weight: 0.1
  sigreg_vectorized: true
  sigreg_test_method: char_function
  sigreg_char_function_num_quadrature: 16

training:
  epochs: 1
  warmup_epochs: 0
  optimizer: adamw
  lr: 1.5e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  lr_schedule: cosine
  use_amp: false
  ema_momentum_schedule:
    start: 0.996
    end: 1.0
    warmup_steps: 10

logging:
  log_frequency: 1
  use_wandb: false
  use_tensorboard: false

checkpoint:
  save_best: false
  save_frequency: 100

device: cpu
