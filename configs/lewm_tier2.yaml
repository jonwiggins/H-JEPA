# LeWM Tier 2: H-JEPA + LeWorldModel architectural simplification.
#
# Builds on Tier 1 and adds the central architectural claim of LeWorldModel:
#   - No EMA target encoder. The context encoder is shared and gradients
#     flow through both branches of the JEPA pair.
#   - SIGReg alone prevents collapse (no VICReg, no stop-gradient).
#   - Targets are not detached, so the prediction loss can shape both
#     encoder branches.
#
# The hierarchical FPN stack and masked-patch SSL setup are preserved, so
# this exercises a hypothesis the original LeWorldModel paper does not test:
# whether SIGReg-only training generalizes to multi-scale hierarchies.

experiment:
  name: lewm_tier2
  seed: 42
  output_dir: results/lewm_tier2

model:
  encoder_type: vit_tiny_patch16_224
  img_size: 224
  embed_dim: 192
  num_hierarchies: 3
  use_fpn: true
  use_rope: true
  use_flash_attention: false
  use_layerscale: true
  layerscale_init: 1.0e-5
  projection_norm: batchnorm
  # Tier 2 architectural simplification:
  use_target_encoder: false  # no EMA, single shared encoder
  predictor:
    depth: 4
    num_heads: 4
    mlp_ratio: 4.0

data:
  dataset: cifar10
  data_path: ./data
  image_size: 224
  batch_size: 32
  num_workers: 4

masking:
  num_target_masks: 4
  mask_scale: [0.15, 0.4]
  aspect_ratio: [0.5, 2.0]
  num_context_masks: 2

loss:
  type: hjepa_sigreg
  hierarchy_weights: [1.0, 0.8, 0.6]
  detach_targets: false   # end-to-end gradients per LeWM
  sigreg_num_slices: 1024
  sigreg_weight: 25.0
  sigreg_invariance_weight: 25.0
  sigreg_vectorized: true
  sigreg_test_method: char_function
  sigreg_char_function_t_min: 0.2
  sigreg_char_function_t_max: 4.0
  sigreg_char_function_num_quadrature: 32
  sigreg_char_function_lambda: 1.0

training:
  epochs: 5
  warmup_epochs: 1
  optimizer: adamw
  lr: 1.5e-4
  weight_decay: 0.04
  betas: [0.9, 0.95]
  lr_schedule: cosine
  use_amp: false

logging:
  log_frequency: 20
  use_wandb: false
  use_tensorboard: true

checkpoint:
  save_best: true
  save_frequency: 1
  metric: train_loss
  mode: min

device: mps
