# LeWM Tier 1: H-JEPA + LeWorldModel numerical/architectural refinements.
#
# Adopts three drop-in improvements that the LeWorldModel paper introduces:
#   - Vectorized SIGReg (single batched Epps-Pulley call instead of a Python
#     loop over slices).
#   - Characteristic-function quadrature variant of the Epps-Pulley test.
#   - BatchNorm projection head (LayerNorm strips the variance signal SIGReg
#     is shaping, per the LeWM appendix).
#
# Default H-JEPA behavior (EMA target encoder, hierarchical SSL with masked
# patch prediction) is preserved. This is the safest opt-in config.

experiment:
  name: lewm_tier1
  seed: 42
  output_dir: results/lewm_tier1

model:
  encoder_type: vit_tiny_patch16_224
  img_size: 224
  embed_dim: 192
  num_hierarchies: 3
  use_fpn: true
  use_rope: true
  use_flash_attention: false
  use_layerscale: true
  layerscale_init: 1.0e-5
  # LeWM Tier 1 changes:
  projection_norm: batchnorm
  use_target_encoder: true   # keep EMA target encoder for SSL
  predictor:
    depth: 4
    num_heads: 4
    mlp_ratio: 4.0
  ema:
    momentum: 0.996
    momentum_end: 1.0
    momentum_warmup_epochs: 5

data:
  dataset: cifar10
  data_path: ./data
  image_size: 224
  batch_size: 32
  num_workers: 4

masking:
  num_target_masks: 4
  mask_scale: [0.15, 0.4]
  aspect_ratio: [0.5, 2.0]
  num_context_masks: 2

loss:
  type: hjepa_sigreg
  hierarchy_weights: [1.0, 0.8, 0.6]
  # LeWM Tier 1 SIGReg refinements:
  sigreg_num_slices: 1024
  sigreg_weight: 25.0
  sigreg_invariance_weight: 25.0
  sigreg_vectorized: true
  sigreg_test_method: char_function
  sigreg_char_function_t_min: 0.2
  sigreg_char_function_t_max: 4.0
  sigreg_char_function_num_quadrature: 32
  sigreg_char_function_lambda: 1.0

training:
  epochs: 5
  warmup_epochs: 1
  optimizer: adamw
  lr: 1.5e-4
  weight_decay: 0.04
  betas: [0.9, 0.95]
  lr_schedule: cosine
  use_amp: false
  ema_momentum_schedule:
    start: 0.996
    end: 1.0
    warmup_steps: 100

logging:
  log_frequency: 20
  use_wandb: false
  use_tensorboard: true

checkpoint:
  save_best: true
  save_frequency: 1
  metric: train_loss
  mode: min

device: mps
